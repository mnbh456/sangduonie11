<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>摸哈气猫挑战</title>
  <style>
    :root {
      --cream: #fff8f0;
      --pink: #ff9eb5;
      --pink-dark: #ff6b8a;
      --orange: #ffb347;
      --text: #5a4a42;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      color: var(--text);
    }

    /* 通用屏幕 */
    .screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen.active {
      display: flex;
    }

    /* 主页面 */
    #menu-screen {
      background: url('menu_bg.gif') center/cover no-repeat;
    }

    .menu-card {
      text-align: center;
      padding: 48px 40px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(255, 107, 138, 0.25), inset 0 0 0 2px rgba(255, 255, 255, 0.8);
      animation: float 4s ease-in-out infinite;
      max-width: 90vw;
    }

    .game-title {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 900;
      margin: 0 0 12px;
      background: linear-gradient(90deg, #ff6b8a, #ff9eb5, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 6px 16px rgba(255, 107, 138, 0.2);
    }

    .game-author {
      font-size: clamp(0.8rem, 2.6vw, 1rem);
      color: #8d7b70;
      margin: 0 0 8px;
    }

    .game-author a {
      color: #ff6b8a;
      text-decoration: none;
      font-weight: 700;
    }

    .game-author a:hover {
      text-decoration: underline;
    }

    .download-tip {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 0.9rem;
      color: #5a4a42;
      background: rgba(255, 255, 255, 0.72);
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      z-index: 10;
    }
    .download-tip a {
      color: #ff6b8a;
      text-decoration: none;
      font-weight: 700;
    }
    .download-tip a:hover {
      text-decoration: underline;
    }

    .game-subtitle {
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: #8d7b70;
      margin-bottom: 32px;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 16px 40px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--pink-dark), var(--orange));
      box-shadow: 0 8px 24px rgba(255, 107, 138, 0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
      opacity: 0.6;
    }

    .btn:active {
      transform: scale(0.94);
      box-shadow: 0 4px 12px rgba(255, 107, 138, 0.35);
    }

    .btn-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #a8a8a8, #d1d1d1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    /* 游戏页 */
    #game-screen {
      background: var(--white);
      cursor: none;
      touch-action: none;
    }

    #timer {
      position: fixed;
      top: 18px;
      left: 18px;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      color: var(--pink-dark);
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 18px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      z-index: 10;
    }

    .cat-stage {
      position: relative;
      width: min(86vw, 76vh);
      height: min(86vw, 76vh);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cat-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: auto;
      transition: transform 0.1s ease;
      animation: idleBob 2.6s ease-in-out infinite;
    }

    #cat-img.hissing {
      animation: hissShake 0.35s ease-in-out infinite;
    }

    #cat-img.petting {
      transform: scale(1.04);
    }

    @keyframes idleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes hissShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-1deg); }
      75% { transform: translateX(4px) rotate(1deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 光标跟随 */
    #cursor-follower {
      position: fixed;
      width: 44px;
      height: 44px;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.12s ease;
      display: none;
    }

    #cursor-follower.visible {
      transform: translate(-50%, -50%) scale(1);
    }

    #cursor-follower .paw {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 158, 181, 0.95), rgba(255, 107, 138, 0.95));
      box-shadow: 0 4px 12px rgba(255, 107, 138, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    /* 失败页 */
    #fail-screen {
      background: var(--white);
      z-index: 50;
      pointer-events: none;
    }

    #fail-screen.active {
      pointer-events: auto;
    }

    #fail-img {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(86vw, 76vh);
      height: min(86vw, 76vh);
      object-fit: contain;
      transform: translate(-50%, -50%);
      z-index: 51;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1),
                  height 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #fail-img.zoomed {
      width: 100vw;
      height: 100vh;
    }

    #fail-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      opacity: 0;
      z-index: 52;
      transition: opacity 0.8s ease 0.9s;
      padding: 24px;
      text-align: center;
    }

    #fail-overlay.show {
      opacity: 1;
    }

    .fail-title {
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      font-weight: 900;
      color: var(--pink-dark);
      margin: 0 0 12px;
      text-shadow: 0 4px 12px rgba(255, 107, 138, 0.25);
    }

    .fail-score {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      color: #6d5d53;
      margin-bottom: 32px;
    }

    .hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #b0a298;
      z-index: 10;
      text-align: center;
      max-width: 90vw;
    }

    /* 隐藏移动端光标 */
    @media (pointer: coarse) {
      #game-screen {
        cursor: auto;
      }
      #cursor-follower {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- 主页面 -->
  <div id="menu-screen" class="screen active">
    <div class="download-tip">推荐<a href="https://wwbtl.lanzout.com/iEu1n3w012kj" target="_blank" rel="noopener noreferrer">下载</a>后游玩</div>
    <div class="menu-card">
      <p class="game-author">本游戏由哔哩哔哩<a href="https://space.bilibili.com/3707011879406390?" target="_blank" rel="noopener noreferrer">ccMAX-1</a>制作</p>
      <h1 class="game-title">摸哈气猫挑战</h1>
      <p class="game-subtitle">摸摸小猫，小心它哈气哦～</p>
      <button id="start-btn" class="btn">开始游戏</button>
    </div>
  </div>

  <!-- 游戏页 -->
  <div id="game-screen" class="screen">
    <div id="timer">0.0</div>
    <div class="cat-stage">
      <img id="cat-img" src="cat_normal.png" alt="小猫" draggable="false" />
    </div>
    <div class="hint">长按或点击猫咪来摸它，哈气时请立刻停手！</div>
    <div id="cursor-follower"><div class="paw">🐾</div></div>
  </div>

  <!-- 失败页 -->
  <div id="fail-screen" class="screen">
    <img id="fail-img" src="fail.png" alt="失败" draggable="false" />
    <div id="fail-overlay">
      <h2 class="fail-title">你失败了</h2>
      <p class="fail-score">本局摸了桑多涅 <span id="final-score">0.0</span> 秒</p>
      <div class="btn-row">
        <button id="restart-btn" class="btn">再来一局</button>
        <button id="home-btn" class="btn btn-secondary">返回主界面</button>
      </div>
    </div>
  </div>

  <script>
    // ===== 音频 =====
    const audioHiss = new Audio('hiss.mp3');
    const audioFail = new Audio('howl.mp3');
    const audioButton = new Audio('click.mp3');

    function playSound(audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    // ===== DOM 引用 =====
    const menuScreen = document.getElementById('menu-screen');
    const gameScreen = document.getElementById('game-screen');
    const failScreen = document.getElementById('fail-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const homeBtn = document.getElementById('home-btn');
    const catImg = document.getElementById('cat-img');
    const catStage = document.querySelector('.cat-stage');
    const failImg = document.getElementById('fail-img');
    const failOverlay = document.getElementById('fail-overlay');
    const timerEl = document.getElementById('timer');
    const finalScoreEl = document.getElementById('final-score');
    const cursorFollower = document.getElementById('cursor-follower');

    // ===== 游戏状态 =====
    let state = {
      totalTime: 0,
      isPetting: false,
      isHissing: false,
      hissStartTime: 0,
      hissFailThreshold: 0,
      nextHissTimer: null,
      hissEndTimer: null,
      gameLoop: null,
      active: false
    };

    // ===== 工具函数 =====
    function randBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function showScreen(name) {
      [menuScreen, gameScreen, failScreen].forEach(s => s.classList.remove('active'));
      if (name === 'menu') menuScreen.classList.add('active');
      if (name === 'game') gameScreen.classList.add('active');
      if (name === 'fail') failScreen.classList.add('active');
    }

    function formatTime(seconds) {
      return seconds.toFixed(1);
    }

    // ===== 猫咪本体命中检测 =====
    const hitCanvas = document.createElement('canvas');
    const hitCtx = hitCanvas.getContext('2d', { willReadFrequently: true });
    let catImageData = null;

    function loadCatImageData() {
      if (!catImg.complete || catImg.naturalWidth === 0) return;
      hitCanvas.width = catImg.naturalWidth;
      hitCanvas.height = catImg.naturalHeight;
      hitCtx.clearRect(0, 0, hitCanvas.width, hitCanvas.height);
      hitCtx.drawImage(catImg, 0, 0);
      try {
        catImageData = hitCtx.getImageData(0, 0, hitCanvas.width, hitCanvas.height);
      } catch (e) {
        catImageData = null;
      }
    }

    catImg.addEventListener('load', loadCatImageData);
    loadCatImageData();

    function isOverCatBody(clientX, clientY) {
      const stageRect = catStage.getBoundingClientRect();
      const stageW = stageRect.width;
      const stageH = stageRect.height;
      const rx = clientX - stageRect.left;
      const ry = clientY - stageRect.top;

      const imgW = catImg.naturalWidth;
      const imgH = catImg.naturalHeight;
      const scale = Math.min(stageW / imgW, stageH / imgH);
      const dispW = imgW * scale;
      const dispH = imgH * scale;
      const dispLeft = (stageW - dispW) / 2;
      const dispTop = (stageH - dispH) / 2;

      if (rx < dispLeft || rx > dispLeft + dispW || ry < dispTop || ry > dispTop + dispH) {
        return false;
      }

      if (!catImageData) return true;

      const px = Math.floor((rx - dispLeft) / scale);
      const py = Math.floor((ry - dispTop) / scale);
      const idx = (py * imgW + px) * 4;
      return catImageData.data[idx + 3] > 50;
    }

    // ===== 游戏循环 =====
    let lastFrameTime = 0;

    function startGameLoop() {
      stopGameLoop();
      lastFrameTime = Date.now();
      state.gameLoop = requestAnimationFrame(gameTick);
    }

    function stopGameLoop() {
      if (state.gameLoop) {
        cancelAnimationFrame(state.gameLoop);
        state.gameLoop = null;
      }
    }

    function gameTick() {
      if (!state.active) return;

      const now = Date.now();
      const delta = (now - lastFrameTime) / 1000;
      lastFrameTime = now;

      if (state.isPetting) {
        state.totalTime += delta;
        timerEl.textContent = formatTime(state.totalTime);
      }

      // 哈气期间持续摸猫检测失败
      if (state.isHissing && state.isPetting) {
        const elapsed = (now - state.hissStartTime) / 1000;
        if (elapsed >= state.hissFailThreshold) {
          gameOver();
          return;
        }
      }

      state.gameLoop = requestAnimationFrame(gameTick);
    }

    // ===== 哈气惩罚 =====
    function scheduleHiss() {
      if (!state.active) return;
      const delay = randBetween(3, 5) * 1000;
      state.nextHissTimer = setTimeout(triggerHiss, delay);
    }

    function triggerHiss() {
      if (!state.active || state.isHissing) return;
      state.isHissing = true;
      state.hissStartTime = Date.now();
      state.hissFailThreshold = randBetween(0.3, 1.5);
      catImg.src = 'cat_hiss.png';
      catImg.classList.add('hissing');
      playSound(audioHiss);

      state.hissEndTimer = setTimeout(() => {
        endHiss();
      }, 2000);
    }

    function endHiss() {
      if (!state.active) return;
      state.isHissing = false;
      state.hissStartTime = 0;
      catImg.src = 'cat_normal.png';
      catImg.classList.remove('hissing');
      scheduleHiss();
    }

    // ===== 摸猫交互 =====
    function startPetting() {
      if (!state.active) return;
      state.isPetting = true;
      catImg.classList.add('petting');
    }

    function stopPetting() {
      state.isPetting = false;
      catImg.classList.remove('petting');
    }

    // ===== 游戏结束 =====
    function gameOver() {
      state.active = false;
      stopGameLoop();
      clearTimeout(state.nextHissTimer);
      clearTimeout(state.hissEndTimer);
      playSound(audioFail);

      showScreen('fail');
      finalScoreEl.textContent = formatTime(state.totalTime);

      // 失败图片放大动画
      requestAnimationFrame(() => {
        failImg.classList.add('zoomed');
      });

      // 延迟显示失败 UI
      setTimeout(() => {
        failOverlay.classList.add('show');
      }, 100);
    }

    // ===== 初始化 / 重置 =====
    function resetGame() {
      state.active = false;
      stopGameLoop();
      state.totalTime = 0;
      state.isPetting = false;
      state.isHissing = false;
      state.hissStartTime = 0;
      state.hissFailThreshold = 0;
      clearTimeout(state.nextHissTimer);
      clearTimeout(state.hissEndTimer);

      timerEl.textContent = '0.0';
      catImg.src = 'cat_normal.png';
      catImg.classList.remove('hissing', 'petting');
      failImg.classList.remove('zoomed');
      failOverlay.classList.remove('show');
    }

    function startGame() {
      resetGame();
      state.active = true;
      showScreen('game');
      startGameLoop();
      scheduleHiss();
    }

    // ===== 事件绑定 =====
    startBtn.addEventListener('click', () => {
      playSound(audioButton);
      startGame();
    });

    restartBtn.addEventListener('click', () => {
      playSound(audioButton);
      startGame();
    });

    homeBtn.addEventListener('click', () => {
      playSound(audioButton);
      resetGame();
      showScreen('menu');
    });

    // 猫咪触摸 / 鼠标交互：只有落在猫咪本体（非透明像素）上才算摸猫
    let pointerDown = false;

    function getClientPos(e) {
      if (e.touches && e.touches.length) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.changedTouches && e.changedTouches.length) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function updatePettingFromEvent(e) {
      if (!state.active || !pointerDown) {
        stopPetting();
        return;
      }
      const pos = getClientPos(e);
      if (isOverCatBody(pos.x, pos.y)) {
        startPetting();
      } else {
        stopPetting();
      }
    }

    function onPetStart(e) {
      if (!state.active) return;
      if (e.type === 'touchstart') e.preventDefault();
      pointerDown = true;
      updatePettingFromEvent(e);
    }

    function onPetMove(e) {
      if (e.type === 'touchmove') e.preventDefault();
      updatePettingFromEvent(e);
    }

    function onPetEnd() {
      pointerDown = false;
      stopPetting();
    }

    document.addEventListener('pointerdown', onPetStart);
    document.addEventListener('pointermove', onPetMove);
    document.addEventListener('pointerup', onPetEnd);
    document.addEventListener('pointercancel', onPetEnd);

    document.addEventListener('mousedown', onPetStart);
    document.addEventListener('mousemove', onPetMove);
    document.addEventListener('mouseup', onPetEnd);

    document.addEventListener('touchstart', onPetStart, { passive: false });
    document.addEventListener('touchmove', onPetMove, { passive: false });
    document.addEventListener('touchend', onPetEnd);
    document.addEventListener('touchcancel', onPetEnd);

    // 光标跟随（桌面端）
    window.addEventListener('pointermove', (e) => {
      if (window.matchMedia('(pointer: coarse)').matches) return;
      cursorFollower.style.left = e.clientX + 'px';
      cursorFollower.style.top = e.clientY + 'px';
      if (gameScreen.classList.contains('active')) {
        cursorFollower.style.display = 'block';
        requestAnimationFrame(() => cursorFollower.classList.add('visible'));
      }
    });

    gameScreen.addEventListener('pointerleave', () => {
      cursorFollower.classList.remove('visible');
    });

    // 防止移动端滚动与缩放
    document.addEventListener('touchmove', (e) => {
      if (gameScreen.classList.contains('active')) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
